<!DOCTYPE html>
<html>
<head>
  <title>Performance Test</title>
  <link rel="stylesheet" href="src/styles/grid.css">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .controls { margin: 20px 0; }
    button { padding: 8px 16px; margin-right: 10px; }
    #perf { background: #f0f0f0; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>HighGrid Performance Test</h1>

  <div class="controls">
    <button id="addTheme">Add ag-theme-dark</button>
    <button id="removeTheme">Remove ag-theme-dark</button>
    <button id="toggleTheme">Toggle Theme (10x)</button>
  </div>

  <div id="perf"></div>
  <div id="grid" style="height: 500px;"></div>

  <script type="module">
    import { createGrid } from './dist/highgrid.js';

    const rows = Array.from({ length: 1000 }, (_, i) => ({
      id: i,
      name: `Row ${i}`,
      value: Math.random() * 1000
    }));

    const grid = createGrid('#grid', {
      columns: [
        { id: 'id', field: 'id', headerName: 'ID', width: 80 },
        { id: 'name', field: 'name', headerName: 'Name', width: 200 },
        { id: 'value', field: 'value', headerName: 'Value', width: 150 },
      ],
      rows
    });

    const container = document.querySelector('#grid');
    const perfDiv = document.querySelector('#perf');

    document.querySelector('#addTheme').onclick = () => {
      const start = performance.now();
      container.classList.add('ag-theme-dark');
      const duration = performance.now() - start;
      perfDiv.textContent = `Theme added in ${duration.toFixed(2)}ms`;
    };

    document.querySelector('#removeTheme').onclick = () => {
      const start = performance.now();
      container.classList.remove('ag-theme-dark');
      const duration = performance.now() - start;
      perfDiv.textContent = `Theme removed in ${duration.toFixed(2)}ms`;
    };

    document.querySelector('#toggleTheme').onclick = () => {
      const times = [];
      for (let i = 0; i < 10; i++) {
        const start = performance.now();
        container.classList.toggle('ag-theme-dark');
        times.push(performance.now() - start);
      }
      const avg = times.reduce((a, b) => a + b, 0) / times.length;
      const max = Math.max(...times);
      perfDiv.textContent = `10x toggles: avg ${avg.toFixed(2)}ms, max ${max.toFixed(2)}ms`;
    };
  </script>
</body>
</html>
